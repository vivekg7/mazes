name: mazes
description: The most complete offline maze puzzle app.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  maze_core:
    path: ../../packages/maze_core
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  web:
    generate: true
  image_path: "assets/icon/icon_1024.png"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/icon/icon_1024.png"

flutter_native_splash:
  color: "#1a1a2e"
  color_dark: "#1a1a2e"
  image: "assets/icon/icon_1024.png"
  image_dark: "assets/icon/icon_1024.png"
  android: true
  ios: true
  web: true
  android_12:
    color: "#1a1a2e"
    color_dark: "#1a1a2e"
